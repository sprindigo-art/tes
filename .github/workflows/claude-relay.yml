name: claude-relay-v5
on:
  push:
    paths: ['.trigger']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  call-claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test file attachment bypass
        env:
          SK: ${{ secrets.SESSION_KEY }}
          ORG: ${{ secrets.ORG_ID }}
        run: |
          pip install -q curl_cffi
          python3 test_bypass.py
      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add -A
          git commit -m "v5" || true
          git push || true
