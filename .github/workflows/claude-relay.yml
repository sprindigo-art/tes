name: claude-relay-v2
on:
  push:
    paths: ['.trigger']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  call-claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Call Claude Opus via sessionKey
        env:
          SK: ${{ secrets.SESSION_KEY }}
          ORG: ${{ secrets.ORG_ID }}
        run: |
          pip install -q curl_cffi
          python3 -c "
          import json, os
          from curl_cffi import requests
          SK = os.environ['SK']
          ORG = os.environ['ORG']
          cookies = {'sessionKey': SK, 'lastActiveOrg': ORG}
          r = requests.post(f'https://claude.ai/api/organizations/{ORG}/chat_conversations', cookies=cookies, json={'name':'','project_uuid':None}, impersonate='chrome116')
          conv = r.json().get('uuid','')
          print(f'Conv: {conv}')
          r2 = requests.post(f'https://claude.ai/api/organizations/{ORG}/chat_conversations/{conv}/completion', cookies=cookies, json={'prompt':'Say RELAY_OPUS_OK if you are Opus 4.6','timezone':'UTC','model':'claude-opus-4-6'}, impersonate='chrome116')
          print(f'Status: {r2.status_code}')
          with open('result.txt','w') as f: f.write(r2.text[:3000])
          print(r2.text[:500])
          "
      - name: Push result
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add -A
          git commit -m "result" || true
          git push || true
